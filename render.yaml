services:
  - type: web
    name: roboss-backend-staging
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /ready
    autoDeployTrigger: off
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roboss-postgres-staging
          property: connectionString
      - key: PORT
        value: "3002"
      - key: NODE_ENV
        value: staging
      - key: CORS_ORIGIN
        value: https://roboss-portal.vercel.app
      - key: CLERK_AUTH_MODE
        value: clerk
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_JWT_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SCAN_TOKEN_SECRET
        generateValue: true
      - key: BRANCH_PAYMENT_CREDENTIAL_SECRET
        generateValue: true
      - key: AUTH_ALLOW_DEV_LOGIN
        value: "false"
      - key: ALLOW_SIMULATED_WASH
        value: "false"
      - key: PAYMENT_ALLOW_MANUAL_CONFIRM
        value: "false"
      - key: PAYMENT_PROVIDER_NAME
        value: stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYMENT_PROVIDER_WEBHOOK_SECRET
        generateValue: true

databases:
  - name: roboss-postgres-staging
    databaseName: roboss
    plan: free
    region: singapore
